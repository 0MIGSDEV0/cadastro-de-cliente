<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Formulário de cadastro -->
    <div class="container">
        <h1>Cadastro de Cliente</h1>
        <form id="cadastroForm">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" placeholder="Digite seu telefone" required>

            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" placeholder="Digite seu endereço" required>

            <label for="dataNascimento">Data de Nascimento:</label>
            <input type="date" id="dataNascimento" required>

            <button type="submit">Cadastrar</button>
        </form>
    </div>

    <!-- Confirmação -->
    <div class="confirmacao" id="confirmacao" style="display:none;">
        <h1>Cadastro Concluído!</h1>
        <p>Seu cadastro foi realizado com sucesso.</p>
        <a href="#" id="voltarCadastro">Voltar ao Cadastro</a>
    </div>

    <!-- Lista de clientes -->
    <div class="container">
        <h1>Clientes Cadastrados</h1>
        <div id="clientesList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
