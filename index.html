<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Clientes • Sigiloso</title>

  <style>
    :root {
      --bg: #0a0018;
      --card: #1a0033;
      --primary: #a855f7;
      --primary-dark: #7e22ce;
      --accent: #c084fc;
      --text: #f3e8ff;
      --text-light: #d1b8e9;
      --border: #6b21a8;
      --success: #a3e635;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(circle at 10% 20%, #4c1d95 1px, transparent 1px),
        radial-gradient(circle at 90% 80%, #6d28d9 1px, transparent 1px);
      background-size: 40px 40px;
      line-height: 1.5;
    }

    .container {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      position: relative;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6),
                  0 0 0 1px rgba(168,85,247,0.12) inset;
      backdrop-filter: blur(4px);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.8rem;
      color: var(--accent);
      text-align: center;
      margin-bottom: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .form-group {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-light);
      font-size: 0.95rem;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(30, 0, 50, 0.6);
      color: white;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.25);
      background: rgba(30, 0, 50, 0.85);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 20px rgba(168,85,247,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(168,85,247,0.55);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #64748b, #475569);
      color: white;
      box-shadow: 0 4px 14px rgba(100,116,139,0.3);
    }

    .btn-secondary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(100,116,139,0.45);
    }

    .success-screen {
      text-align: center;
      padding: 3rem 1.5rem;
    }

    .success-title {
      color: var(--success);
      font-size: 2.1rem;
      margin-bottom: 1rem;
    }

    .success-text {
      color: var(--text-light);
      margin: 1.2rem 0 2rem;
    }

    #clientes-lista {
      margin-top: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(20, 0, 40, 0.6);
      max-height: 380px;
      overflow-y: auto;
    }

    .cliente-item {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid rgba(139, 92, 246, 0.15);
      font-size: 0.95rem;
    }

    .cliente-item:last-child {
      border-bottom: none;
    }

    .cliente-nome {
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.4rem;
      display: block;
    }

    .cliente-dado {
      color: var(--text-light);
      font-size: 0.9rem;
      margin: 0.25rem 0;
    }

    .cliente-dado strong {
      color: #c4b5fd;
    }

    .empty-message {
      padding: 2rem;
      text-align: center;
      color: #8b5cf6aa;
      font-style: italic;
    }

    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    @media (max-width: 480px) {
      .card { padding: 1.6rem; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Tela de Sucesso -->
  <div class="card success-screen" id="tela-sucesso" style="display:none">
    <h2 class="success-title">Cadastro Realizado!</h2>
    <p class="success-text">
      As informações foram salvas com segurança no seu navegador.<br>
      Os dados <strong>não saem</strong> do seu dispositivo.
    </p>
    <button class="btn btn-primary" id="btn-novo-cadastro">
      Cadastrar Novo Cliente
    </button>
  </div>

  <!-- Formulário principal -->
  <div class="card" id="tela-form">
    <h1>Cadastro de Cliente</h1>

    <form id="form-cadastro">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" required placeholder="João Silva Santos" autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" required placeholder="joao.silva@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="telefone">Telefone / WhatsApp</label>
        <input type="tel" id="telefone" required placeholder="(41) 99999-9999" autocomplete="tel">
      </div>

      <div class="form-group">
        <label for="endereco">Endereço</label>
        <input type="text" id="endereco" required placeholder="Rua das Flores, 198 – Centro">
      </div>

      <div class="form-group">
        <label for="nascimento">Data de nascimento</label>
        <input type="date" id="nascimento" required autocomplete="bday">
      </div>

      <button type="submit" class="btn btn-primary">
        Cadastrar com Sigilo
      </button>
    </form>

    <div class="actions">
      <button type="button" class="btn btn-secondary" id="btn-ver-lista">
        Ver todos os clientes
      </button>
    </div>

    <div id="clientes-lista"></div>
  </div>

</div>

<script>
const form        = document.getElementById('form-cadastro');
const telaForm    = document.getElementById('tela-form');
const telaSucesso = document.getElementById('tela-sucesso');
const btnNovo     = document.getElementById('btn-novo-cadastro');
const btnVerLista = document.getElementById('btn-ver-lista');
const listaDiv    = document.getElementById('clientes-lista');

function getClientes() {
  return JSON.parse(localStorage.getItem('clientesSigilosos') || '[]');
}

function salvarCliente(cliente) {
  const clientes = getClientes();
  clientes.push(cliente);
  localStorage.setItem('clientesSigilosos', JSON.stringify(clientes));
}

function renderizarLista() {
  const clientes = getClientes();
  listaDiv.innerHTML = '';

  if (clientes.length === 0) {
    listaDiv.innerHTML = '<div class="empty-message">Ainda não há clientes cadastrados.</div>';
    return;
  }

  clientes.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'cliente-item';

    item.innerHTML = `
      <span class="cliente-nome">#${i+1} – ${c.nome}</span>
      <div class="cliente-dado"><strong>E-mail:</strong> ${c.email}</div>
      <div class="cliente-dado"><strong>Telefone:</strong> ${c.telefone}</div>
      <div class="cliente-dado"><strong>Endereço:</strong> ${c.endereco}</div>
      <div class="cliente-dado"><strong>Nascimento:</strong> ${c.nascimento ? new Date(c.nascimento).toLocaleDateString('pt-BR') : '-'}</div>
      <div class="cliente-dado" style="margin-top:0.6rem; font-size:0.82rem; opacity:0.7;">
        Cadastrado em: ${new Date(c.cadastradoEm).toLocaleString('pt-BR')}
      </div>
    `;
    listaDiv.appendChild(item);
  });
}

form.addEventListener('submit', e => {
  e.preventDefault();

  const cliente = {
    nome:        form.nome.value.trim(),
    email:       form.email.value.trim(),
    telefone:    form.telefone.value.trim(),
    endereco:    form.endereco.value.trim(),
    nascimento:  form.nascimento.value,
    cadastradoEm: new Date().toISOString()
  };

  salvarCliente(cliente);
  form.reset();

  telaForm.style.display = 'none';
  telaSucesso.style.display = 'block';
});

btnNovo.addEventListener('click', () => {
  telaSucesso.style.display = 'none';
  telaForm.style.display = 'block';
  listaDiv.innerHTML = ''; // limpa lista ao voltar pro form
});

btnVerLista.addEventListener('click', () => {
  renderizarLista();
  listaDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// Opcional: mostrar lista automaticamente ao carregar página
// renderizarLista();
</script>
</body>
</html>
